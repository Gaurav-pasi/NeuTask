image: node:20

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - npm ci
    - VITE_BASE=/tracker/ npm run build
  artifacts:
    paths:
      - dist

pages:
  stage: deploy
  script:
    - rm -rf public
    - mv dist public
  artifacts:
    paths:
      - public
  only:
    - main
